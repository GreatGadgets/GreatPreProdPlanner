<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Great Pre-Prod Planner</title>
    <meta name="description" content="Strategic Video Planning & Scripting Utility">
    <meta name="theme-color" content="#020617">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="GreatPlanner">
    <link rel="icon" href="./assets/gppp-logo-Dy10YKs9.png">
    <link rel="apple-touch-icon" href="./assets/gppp-logo-Dy10YKs9.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>📝</text></svg>">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Montserrat:wght@700;900&display=swap" rel="stylesheet">
  <script type="module" crossorigin src="./assets/index-BRMDOHpd.js"></script>
  <link rel="stylesheet" crossorigin href="./assets/index-DUb5DcBp.css">
<link rel="manifest" href="./manifest.webmanifest"><script id="vite-plugin-pwa:register-sw" src="./registerSW.js"></script></head>
<body class="theme-dark bg-slate-950 text-slate-200">
    <div id="app-container">
        <!-- Title Bar -->
        <header class="title-bar">
            <div style="display: flex; align-items: center; gap: 1rem;">
                <img src="./assets/gppp-logo-Dy10YKs9.png" alt="GPPP Logo" class="header-logo">
                <div>
                    <h1>Great Pre-Prod Planner</h1>
                    <p>Strategic Video Planning & Scripting</p>
                </div>
            </div>
            <div class="actions" style="display: flex; align-items: center; gap: 0.75rem;">
                
                <button id="header-new-project-btn" class="header-btn-standalone btn-new">
                    <svg class="icon-small" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4" /></svg>
                    New
                </button>

                <!-- Load Split Button -->
                <div class="dropdown-container split-button" id="load-preset-container">
                    <button class="split-btn-primary btn-load" id="current-preset-name">
                        Work In Progress
                    </button>
                    <button class="split-btn-toggle btn-load dropdown-toggle">
                        <svg class="icon-chevron" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7" /></svg>
                    </button>
                    
                    <!-- Load Dropdown Menu -->
                    <div class="dropdown-menu menu-load" id="load-menu">
                        <div class="menu-scroll-area custom-scrollbar" id="project-list">
                            <!-- Projects list injected by JS -->
                        </div>
                        <div class="menu-footer">
                            <label class="footer-btn cursor-pointer">
                                <input type="file" id="import-json-input" accept=".json" class="hidden">
                                <svg class="icon-small" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a2 2 0 002 2h12a2 2 0 002-2v-1m-4-8l-4-4m0 0L8 8m4-4v12" /></svg>
                                Import
                            </label>
                            <button id="export-json-btn" class="footer-btn">
                                <svg class="icon-small" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a2 2 0 002 2h12a2 2 0 002-2v-1m-4-4l-4 4m0 0l-4-4m4 4V4" /></svg>
                                Export
                            </button>
                        </div>
                    </div>
                </div>

                <!-- Save Split Button -->
                <div class="dropdown-container split-button" id="save-preset-container">
                    <button class="split-btn-primary btn-save" id="save-project-btn">
                        Save
                    </button>
                    <button class="split-btn-toggle btn-save dropdown-toggle">
                        <svg class="icon-chevron" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7" /></svg>
                    </button>
                    
                    <!-- Save Dropdown Menu -->
                    <div class="dropdown-menu menu-save" id="save-menu">
                        <div class="menu-header">
                            <span>Overwrite Existing</span>
                        </div>
                        <div class="menu-scroll-area custom-scrollbar" id="save-project-list">
                            <!-- Existing projects for overwriting injected by JS -->
                        </div>
                        <div class="menu-footer single">
                            <button id="save-as-new-btn" class="footer-btn full">
                                <svg class="icon-small" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v3m0 0v3m0-3h3m-3 0H9m12 0a9 9 0 11-18 0 9 9 0 0118 0z" /></svg>
                                Save as New Project
                            </button>
                        </div>
                    </div>
                </div>

            </div>
        </header>

        <!-- Main Layout with Side Panel -->
        <div class="main-layout">
            <!-- Left Side: Content Creator -->
            <div class="left-content">
                <nav class="tabs">
                    <div class="tab-group">
                        <button class="tab-btn active" data-target="tab-identity" tabindex="-1">Identity & Strategy</button>
                        <button class="tab-btn" data-target="tab-discovery" tabindex="-1">SEO Discovery</button>
                        <button class="tab-btn" data-target="tab-market" tabindex="-1">Market Research</button>
                        <button class="tab-btn" data-target="tab-story" tabindex="-1">Story Spine</button>
                        <button class="tab-btn" data-target="tab-script" tabindex="-1">Script</button>
                        <button class="tab-btn" data-target="tab-prompter" tabindex="-1">Prompter</button>
                        <button class="tab-btn" data-target="tab-assets" tabindex="-1">B.Roll</button>
                        <button class="tab-btn" data-target="tab-thumb" tabindex="-1">Thumbnail</button>
                        <button class="tab-btn" data-target="tab-visual" tabindex="-1">Packaging</button>
                    </div>
                </nav>

                <main id="tab-content-container">
                    <!-- Content injected by JS -->
                </main>
            </div>

            <!-- Right Side: Live Project Preview -->
            <aside class="right-panel">
                <div class="preview-panel">
                    <div class="panel-header">
                        <h3>Technical Blueprint</h3>
                        <div class="blueprint-controls">
                            <button class="control-btn" id="bp-toggle-all" style="min-width: 80px;">Expand</button>
                        </div>
                    </div>
                    <div id="live-preview-content" class="preview-scroll-area">
                        <!-- Live content injected by JS -->
                    </div>
                </div>
            </aside>
        </div>

        </div> <!-- End #app-container -->

        <!-- Core App Logic -->
        </body>
        </html>

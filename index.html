<body class="theme-dark bg-slate-950 text-slate-200">
    <div id="app-container">
        <!-- Title Bar -->
        <header id="main-header" class="title-bar sticky top-0 z-50 transition-transform duration-300">
            <div style="display: flex; align-items: center; gap: 1rem;">
                <img src="./assets/gppp-logo-Dy10YKs9.png" alt="GPPP Logo" class="header-logo">
                <div>
                    <h1>Great Pre-Prod Planner</h1>
                    <p>Strategic Video Planning & Scripting</p>
                </div>
            </div>
            <div class="actions" style="display: flex; align-items: center; gap: 0.75rem;">
                
                <button id="header-new-project-btn" class="header-btn-standalone btn-new">
                    <svg class="icon-small" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4" /></svg>
                    New
                </button>

                <!-- Load Split Button -->
                <div class="dropdown-container split-button" id="load-preset-container">
                    <button class="split-btn-primary btn-load" id="current-preset-name">
                        Work In Progress
                    </button>
                    <button class="split-btn-toggle btn-load dropdown-toggle">
                        <svg class="icon-chevron" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7" /></svg>
                    </button>
                    
                    <!-- Load Dropdown Menu -->
                    <div class="dropdown-menu menu-load" id="load-menu">
                        <div class="menu-scroll-area custom-scrollbar" id="project-list">
                            <!-- Projects list injected by JS -->
                        </div>
                        <div class="menu-footer">
                            <label class="footer-btn cursor-pointer">
                                <input type="file" id="import-json-input" accept=".json" class="hidden">
                                <svg class="icon-small" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a2 2 0 002 2h12a2 2 0 002-2v-1m-4-8l-4-4m0 0L8 8m4-4v12" /></svg>
                                Import
                            </label>
                            <button id="export-json-btn" class="footer-btn">
                                <svg class="icon-small" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a2 2 0 002 2h12a2 2 0 002-2v-1m-4-4l-4 4m0 0l-4-4m4 4V4" /></svg>
                                Export
                            </button>
                        </div>
                    </div>
                </div>

                <!-- Save Split Button -->
                <div class="dropdown-container split-button" id="save-preset-container">
                    <button class="split-btn-primary btn-save" id="save-project-btn">
                        Save
                    </button>
                    <button class="split-btn-toggle btn-save dropdown-toggle">
                        <svg class="icon-chevron" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7" /></svg>
                    </button>
                    
                    <!-- Save Dropdown Menu -->
                    <div class="dropdown-menu menu-save" id="save-menu">
                        <div class="menu-header">
                            <span>Overwrite Existing</span>
                        </div>
                        <div class="menu-scroll-area custom-scrollbar" id="save-project-list">
                            <!-- Existing projects for overwriting injected by JS -->
                        </div>
                        <div class="menu-footer single">
                            <button id="save-as-new-btn" class="footer-btn full">
                                <svg class="icon-small" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v3m0 0v3m0-3h3m-3 0H9m12 0a9 9 0 11-18 0 9 9 0 0118 0z" /></svg>
                                Save as New Project
                            </button>
                        </div>
                    </div>
                </div>

            </div>
        </header>

        <!-- Main Layout with Side Panel -->
        <div class="main-layout">
            <!-- Left Side: Content Creator -->
            <div class="left-content max-[1080px]:flex-1 max-[1080px]:w-full max-[1080px]:min-w-full">
                <nav class="tabs relative w-full flex bg-slate-950 overflow-hidden">
                    <button id="tab-left-btn" onclick="document.querySelector('.tab-group').scrollBy({left: -150, behavior: 'smooth'})" class="z-10 hidden self-start mt-1 items-center justify-center w-8 shrink-0 bg-slate-900 hover:bg-slate-800 border border-blue-500/40 text-blue-400 hover:text-blue-300 shadow-[2px_0_5px_rgba(0,0,0,0.5)] rounded" style="height: 38px; cursor: pointer; transition: all 0.2s;">
                        <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><path d="M15 18l-6-6 6-6"/></svg>
                    </button>
                    <div class="tab-group flex flex-1 overflow-x-auto whitespace-nowrap flex-nowrap pb-2 px-1 snap-x scroll-smooth hide-scrollbars relative z-0">
                        <button class="tab-btn active" data-target="tab-identity" tabindex="-1">Identity & Strategy</button>
                        <button class="tab-btn" data-target="tab-discovery" tabindex="-1">SEO Discovery</button>
                        <button class="tab-btn" data-target="tab-market" tabindex="-1">Market Research</button>
                        <button class="tab-btn" data-target="tab-story" tabindex="-1">Story Spine</button>
                        <button class="tab-btn" data-target="tab-script" tabindex="-1">Script</button>
                        <button class="tab-btn" data-target="tab-prompter" tabindex="-1">Prompter</button>
                        <button class="tab-btn" data-target="tab-assets" tabindex="-1">B.Roll</button>
                        <button class="tab-btn" data-target="tab-thumb" tabindex="-1">Thumbnail</button>
                        <button class="tab-btn" data-target="tab-visual" tabindex="-1">Packaging</button>
                    </div>
                    <button id="tab-right-btn" onclick="document.querySelector('.tab-group').scrollBy({left: 150, behavior: 'smooth'})" class="z-10 hidden self-start mt-1 items-center justify-center w-8 shrink-0 bg-slate-900 hover:bg-slate-800 border border-blue-500/40 text-blue-400 hover:text-blue-300 shadow-[-2px_0_5px_rgba(0,0,0,0.5)] rounded" style="height: 38px; cursor: pointer; transition: all 0.2s;">
                        <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><path d="M9 18l6-6-6-6"/></svg>
                    </button>
                </nav>
                <script>
                    (function() {
                        const tabGroup = document.querySelector('.tab-group');
                        const leftBtn = document.getElementById('tab-left-btn');
                        const rightBtn = document.getElementById('tab-right-btn');
                        function updateTabs() {
                            if (!tabGroup) return;
                            const hasOverflow = tabGroup.scrollWidth > tabGroup.clientWidth + 2;
                            if (hasOverflow) {
                                leftBtn.classList.remove('hidden'); leftBtn.classList.add('flex');
                                rightBtn.classList.remove('hidden'); rightBtn.classList.add('flex');
                            } else {
                                leftBtn.classList.add('hidden'); leftBtn.classList.remove('flex');
                                rightBtn.classList.add('hidden'); rightBtn.classList.remove('flex');
                            }
                        }
                        window.addEventListener('resize', updateTabs);
                        const obs = new MutationObserver(updateTabs);
                        obs.observe(tabGroup, { childList: true, subtree: true, attributes: true });
                        setTimeout(updateTabs, 50);
                    })();
                </script>

                <main id="tab-content-container">
                    <!-- Content injected by JS -->
                </main>
            </div>

            <!-- Right Side: Live Project Preview -->
            <aside id="right-aside-panel" class="right-panel max-[1080px]:fixed max-[1080px]:top-0 max-[1080px]:right-0 max-[1080px]:h-full max-[1080px]:w-80 max-[1080px]:z-[100] max-[1080px]:border-l max-[1080px]:border-blue-500/30 max-[1080px]:shadow-2xl transition-transform duration-300 max-[1080px]:translate-x-full bg-slate-950">
                <div id="mobile-blueprint-panel" class="preview-panel">

                                Copy
                            </button>
                            <button class="control-btn" id="bp-toggle-all" style="min-width: 80px;">Expand</button>
                        </div>
                    </div>
                    <div id="live-preview-content" class="preview-scroll-area">
                        <!-- Live content injected by JS -->
                    </div>
                </div>
            </aside>
        </div>

        </div> <!-- End #app-container -->

        <!-- Mobile Blueprint FAB (Hidden on desktop) -->
        <button id="mobile-blueprint-fab" class="fixed bottom-6 right-6 z-[9999] hidden max-[1080px]:flex items-center justify-center p-3 rounded-full bg-blue-600 hover:bg-blue-500 text-white shadow-lg shadow-blue-900/50 transition-transform active:scale-95 touch-none">
            <svg class="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10" /></svg>
        </button>
